spring.application.name=especialidad

spring.web.error.include-binding-errors=always
spring.web.error.include-message=always

spring.datasource.url=jdbc:mysql://localhost:3306/especialidad?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=7000

app.name=Catalogo de especialidades 
app.version=1.0.0

springdoc.swagger-ui.path=/especialidades.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=alpha